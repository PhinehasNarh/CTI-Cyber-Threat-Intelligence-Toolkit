<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTI Platform</title>
  <!-- Tailwind CSS via CDN (this one works on your network) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cti: {
              bg: '#0a0a14',
              surface: '#111118',
              border: '#1a1a2e',
              green: '#00ff87',
              blue: '#00d4ff',
              purple: '#a78bfa',
              pink: '#f472b6',
              amber: '#fbbf24',
              orange: '#fb923c',
            }
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin:0; background:#0a0a14; color:#e0e0e0; font-family:'IBM Plex Mono','Fira Code',monospace; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#0a0a14; }
    ::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .animate-pulse-dot { animation:pulse 2s infinite; }
    .font-display { font-family:'Space Grotesk',sans-serif; }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
  <!-- React + ReactDOM + PropTypes + Recharts served locally -->
  <script src="/static/js/react.min.js"></script>
  <script src="/static/js/react-dom.min.js"></script>
  <script src="/static/js/prop-types.min.js"></script>
  <script>window.PropTypes = window.PropTypes || PropTypes;</script>
  <script src="/static/js/recharts.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/newsfeed.js"></script>
  <script src="/static/js/iocexplorer.js"></script>
  <script src="/static/js/kevpage.js"></script>
  <script src="/static/js/ipintel.js"></script>
  <script src="/static/js/domainrep.js"></script>
  <script src="/static/js/settingspage.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
